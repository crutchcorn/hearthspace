name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test, format, and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev \
            libwayland-dev wayland-protocols libinput-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libudev-dev \
            libseat-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
            libdrm-dev libsystemd-dev libgtk-4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  deny:
    name: Dependency advisories and bans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No deny.toml is committed yet, so cargo-deny runs with its built-in
      # defaults. The license check is intentionally omitted because it needs an
      # explicit allow-list to be meaningful; advisories/bans/sources are useful
      # out of the box. `unmaintained` is downgraded to a warning because its
      # only hits are transitive dependencies with no safe upgrade available;
      # genuine vulnerabilities/unsound advisories still fail the job.
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          rust-version: 1.93.1
          command: check advisories bans sources
          command-arguments: "--warn unmaintained"

